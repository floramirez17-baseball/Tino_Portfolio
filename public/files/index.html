<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Neon Pixel Snake</title>
  <style>
    :root {
      --void: #05070d;
      --space: #0a1020;
      --panel: #0f1a2e;
      --panel-2: #162642;
      --grid: #152b33;
      --grid-alt: #10242b;
      --cyan: #6fffea;
      --green: #70ff6b;
      --lime: #d7ff6b;
      --red: #ff365d;
      --amber: #ffcc4d;
      --text: #eaffff;
      --muted: #88a7b8;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 110%, rgba(111, 255, 234, 0.18), transparent 34rem),
        radial-gradient(circle at 12% 12%, rgba(255, 54, 93, 0.2), transparent 22rem),
        radial-gradient(circle at 84% 18%, rgba(112, 255, 107, 0.14), transparent 24rem),
        linear-gradient(145deg, var(--void), var(--space) 54%, #02030a);
      color: var(--text);
      font-family: "Courier New", Courier, monospace;
      image-rendering: pixelated;
    }

    body::before {
      position: fixed;
      inset: 0;
      z-index: -1;
      content: "";
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
      background-size: 24px 24px;
      mask-image: linear-gradient(to bottom, transparent, black 18%, black 82%, transparent);
    }

    .cabinet {
      width: min(94vw, 720px);
      padding: clamp(14px, 3vw, 28px);
      border: 4px solid rgba(111, 255, 234, 0.75);
      background:
        linear-gradient(180deg, rgba(22, 38, 66, 0.94), rgba(7, 12, 23, 0.98)),
        var(--panel);
      box-shadow:
        0 0 0 6px rgba(5, 7, 13, 0.95),
        0 0 32px rgba(111, 255, 234, 0.28),
        0 28px 70px rgba(0, 0, 0, 0.55);
    }

    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      color: var(--cyan);
      font-size: clamp(2.2rem, 8vw, 5.3rem);
      line-height: 0.82;
      letter-spacing: -0.09em;
      text-transform: uppercase;
      text-shadow:
        3px 3px 0 #083b3a,
        0 0 12px rgba(111, 255, 234, 0.8),
        0 0 28px rgba(112, 255, 107, 0.35);
    }

    .score-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .scoreboard {
      display: grid;
      min-width: 116px;
      padding: 10px 12px;
      border: 3px solid rgba(111, 255, 234, 0.7);
      background: rgba(4, 9, 17, 0.88);
      box-shadow: inset 0 0 16px rgba(111, 255, 234, 0.12), 0 0 16px rgba(111, 255, 234, 0.18);
      text-align: right;
      text-transform: uppercase;
    }

    .scoreboard span {
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.14em;
    }

    .scoreboard strong {
      color: var(--lime);
      font-size: 1.8rem;
      line-height: 1;
      text-shadow: 0 0 10px rgba(215, 255, 107, 0.55);
    }

    .screen {
      position: relative;
      padding: 10px;
      border: 4px solid #061217;
      background: #03070b;
      box-shadow:
        inset 0 0 0 3px rgba(111, 255, 234, 0.2),
        inset 0 0 34px rgba(111, 255, 234, 0.16),
        0 0 28px rgba(111, 255, 234, 0.2);
    }

    canvas {
      display: block;
      width: 100%;
      max-width: 640px;
      aspect-ratio: 1;
      border: 3px solid #183346;
      background: var(--grid);
      image-rendering: pixelated;
    }

    .overlay {
      position: absolute;
      inset: 10px;
      display: grid;
      place-items: center;
      padding: 20px;
      background:
        linear-gradient(rgba(8, 14, 25, 0.78), rgba(8, 14, 25, 0.9)),
        repeating-linear-gradient(0deg, transparent 0 8px, rgba(111, 255, 234, 0.05) 8px 10px);
      color: var(--text);
      text-align: center;
    }

    .overlay.hidden {
      display: none;
    }

    .message {
      width: min(92%, 480px);
      padding: 22px;
      border: 4px solid var(--cyan);
      background: rgba(4, 9, 17, 0.92);
      box-shadow:
        8px 8px 0 rgba(0, 0, 0, 0.55),
        0 0 28px rgba(111, 255, 234, 0.35);
      animation: messageIn 520ms steps(5, end) both;
    }

    .message h2 {
      margin: 0 0 12px;
      color: var(--amber);
      font-size: clamp(2rem, 8vw, 4.6rem);
      line-height: 0.84;
      text-transform: uppercase;
      text-shadow:
        3px 3px 0 #5a1722,
        0 0 14px rgba(255, 204, 77, 0.75);
      animation: titlePulse 1400ms steps(2, end) infinite;
    }

    .message p {
      margin: 9px 0;
      color: var(--text);
      font-weight: 700;
    }

    .message .hint {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .message button {
      margin-top: 16px;
      padding: 11px 18px;
      border: 3px solid var(--text);
      background: var(--red);
      color: var(--text);
      font: 700 1rem "Courier New", Courier, monospace;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 4px 4px 0 #6f1430, 0 0 16px rgba(255, 54, 93, 0.45);
    }

    .message button:active {
      transform: translate(3px, 3px);
      box-shadow: 1px 1px 0 #6f1430;
    }

    .help {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      margin: 16px 0 0;
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .keys {
      color: var(--cyan);
      letter-spacing: 0.08em;
    }

    @keyframes titlePulse {
      0%,
      100% {
        filter: brightness(1);
        transform: translateY(0);
      }

      50% {
        filter: brightness(1.45);
        transform: translateY(-2px);
      }
    }

    @keyframes messageIn {
      from {
        opacity: 0;
        transform: translateY(18px) scale(0.96);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @media (max-width: 600px) {
      body {
        overflow: auto;
      }

      header,
      .help {
        align-items: stretch;
        flex-direction: column;
      }

      .score-row {
        justify-content: stretch;
      }

      .scoreboard {
        flex: 1;
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <main class="cabinet" aria-label="Neon Pixel Snake game">
    <header>
      <h1>Snake</h1>
      <div class="score-row" aria-live="polite">
        <div class="scoreboard">
          <span>Score</span>
          <strong id="score">0</strong>
        </div>
        <div class="scoreboard">
          <span>Best</span>
          <strong id="highScore">0</strong>
        </div>
      </div>
    </header>

    <section class="screen">
      <canvas id="game" width="640" height="640" aria-label="Snake play field"></canvas>
      <div class="overlay" id="overlay">
        <div class="message">
          <h2 id="messageTitle">Neon Snake</h2>
          <p id="messageText">Use the arrow keys to start. Eat charged apples and leave a glowing trail.</p>
          <p class="hint" id="messageHint">High score is saved in this browser.</p>
          <button id="restart" type="button">Start Game</button>
        </div>
      </div>
    </section>

    <p class="help">
      <span class="keys">Arrow Keys: Move</span>
      <span>Space or Enter: Restart</span>
    </p>
  </main>

  <script>
    (() => {
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const scoreEl = document.querySelector("#score");
      const highScoreEl = document.querySelector("#highScore");
      const overlay = document.querySelector("#overlay");
      const messageTitle = document.querySelector("#messageTitle");
      const messageText = document.querySelector("#messageText");
      const messageHint = document.querySelector("#messageHint");
      const restartButton = document.querySelector("#restart");

      const cells = 24;
      const tile = canvas.width / cells;
      const tickMs = 98;
      const highScoreKey = "neon-pixel-snake-high-score";
      const colors = {
        field: "#122a31",
        fieldAlt: "#0d2229",
        grid: "rgba(111, 255, 234, 0.1)",
        snake: "#0d3a31",
        snakeLight: "#70ff6b",
        snakeBelly: "#d7ff6b",
        food: "#ff365d",
        foodDark: "#991b3a",
        foodLight: "#ffcc4d",
        eye: "#eaffff",
        pupil: "#05070d"
      };

      let snake = [];
      let food = { x: 0, y: 0 };
      let direction = { x: 1, y: 0 };
      let nextDirection = { x: 1, y: 0 };
      let score = 0;
      let highScore = readHighScore();
      let running = false;
      let gameOver = false;
      let lastTick = 0;
      let animationId = 0;
      let titleTime = 0;
      let trail = [];
      let particles = [];

      highScoreEl.textContent = highScore;

      function readHighScore() {
        try {
          return Number(localStorage.getItem(highScoreKey)) || 0;
        } catch {
          return 0;
        }
      }

      function writeHighScore(value) {
        try {
          localStorage.setItem(highScoreKey, String(value));
        } catch {
          // Private browsing modes can reject localStorage writes.
        }
      }

      function resetGame() {
        snake = [
          { x: 11, y: 12 },
          { x: 10, y: 12 },
          { x: 9, y: 12 }
        ];
        direction = { x: 1, y: 0 };
        nextDirection = { x: 1, y: 0 };
        score = 0;
        running = true;
        gameOver = false;
        lastTick = 0;
        trail = [];
        particles = [];
        scoreEl.textContent = score;
        food = placeFood();
        overlay.classList.add("hidden");
        restartButton.textContent = "Restart";
        cancelAnimationFrame(animationId);
        animationId = requestAnimationFrame(loop);
      }

      function placeFood() {
        let candidate;
        do {
          candidate = {
            x: Math.floor(Math.random() * cells),
            y: Math.floor(Math.random() * cells)
          };
        } while (snake.some(part => part.x === candidate.x && part.y === candidate.y));
        return candidate;
      }

      function loop(time) {
        if (time - lastTick >= tickMs && running) {
          update();
          lastTick = time;
        }

        draw(time);

        if (running || particles.length > 0) {
          animationId = requestAnimationFrame(loop);
        }
      }

      function update() {
        direction = nextDirection;
        const head = snake[0];
        const nextHead = {
          x: head.x + direction.x,
          y: head.y + direction.y
        };

        trail.unshift({ x: head.x, y: head.y, life: 1 });
        trail = trail.slice(0, 18).map(item => ({ ...item, life: item.life - 0.055 })).filter(item => item.life > 0);

        const hitWall = nextHead.x < 0 || nextHead.x >= cells || nextHead.y < 0 || nextHead.y >= cells;
        const willEat = nextHead.x === food.x && nextHead.y === food.y;
        const bodyToCheck = willEat ? snake : snake.slice(0, -1);
        const hitSelf = bodyToCheck.some(part => part.x === nextHead.x && part.y === nextHead.y);

        if (hitWall || hitSelf) {
          endGame(head);
          return;
        }

        snake.unshift(nextHead);

        if (willEat) {
          score += 10;
          scoreEl.textContent = score;
          burst(food.x, food.y, 16, "#ffcc4d");
          food = placeFood();
        } else {
          snake.pop();
        }
      }

      function endGame(origin) {
        running = false;
        gameOver = true;
        burst(origin.x, origin.y, 58, "#ff365d");

        if (score > highScore) {
          highScore = score;
          highScoreEl.textContent = highScore;
          writeHighScore(highScore);
          messageHint.textContent = "New high score saved in this browser.";
        } else {
          messageHint.textContent = `Best score: ${highScore}.`;
        }

        messageTitle.textContent = "Game Over";
        messageText.textContent = `Final score: ${score}. Press Space, Enter, or the button to try again.`;
        restartButton.textContent = "Play Again";
        overlay.classList.remove("hidden");
      }

      function burst(x, y, amount, color) {
        const cx = x * tile + tile / 2;
        const cy = y * tile + tile / 2;

        for (let i = 0; i < amount; i += 1) {
          const angle = Math.random() * Math.PI * 2;
          const speed = 1.4 + Math.random() * 4.2;
          particles.push({
            x: cx,
            y: cy,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 1,
            size: 3 + Math.floor(Math.random() * 6),
            color
          });
        }
      }

      function updateParticles() {
        particles = particles.map(particle => ({
          ...particle,
          x: particle.x + particle.vx,
          y: particle.y + particle.vy,
          vx: particle.vx * 0.95,
          vy: particle.vy * 0.95 + 0.03,
          life: particle.life - 0.025
        })).filter(particle => particle.life > 0);
      }

      function setDirection(next) {
        if (next.x + direction.x === 0 && next.y + direction.y === 0) {
          return;
        }
        nextDirection = next;
      }

      function draw(time = 0) {
        updateParticles();
        drawField(time);
        drawTrail();
        drawFood(time);
        snake.forEach((part, index) => drawSnakePart(part, index));
        drawParticles();
      }

      function drawField(time) {
        const flicker = Math.sin(time / 360) * 0.04;
        ctx.fillStyle = colors.field;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        for (let y = 0; y < cells; y += 1) {
          for (let x = 0; x < cells; x += 1) {
            ctx.fillStyle = (x + y) % 2 === 0 ? colors.fieldAlt : colors.field;
            ctx.fillRect(x * tile, y * tile, tile, tile);
          }
        }

        ctx.save();
        ctx.globalAlpha = 0.75 + flicker;
        ctx.strokeStyle = colors.grid;
        ctx.lineWidth = 2;
        for (let i = 0; i <= cells; i += 1) {
          ctx.beginPath();
          ctx.moveTo(i * tile, 0);
          ctx.lineTo(i * tile, canvas.height);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(0, i * tile);
          ctx.lineTo(canvas.width, i * tile);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawTrail() {
        ctx.save();
        trail.forEach(item => {
          const px = item.x * tile;
          const py = item.y * tile;
          ctx.globalAlpha = item.life * 0.5;
          ctx.shadowColor = "#70ff6b";
          ctx.shadowBlur = 18;
          ctx.fillStyle = "#70ff6b";
          ctx.fillRect(px + tile * 0.22, py + tile * 0.22, tile * 0.56, tile * 0.56);
        });
        ctx.restore();
      }

      function drawFood(time) {
        const px = food.x * tile;
        const py = food.y * tile;
        const pulse = Math.sin(time / 120) > 0 ? 1 : 0;

        ctx.save();
        ctx.shadowColor = colors.food;
        ctx.shadowBlur = 22;
        ctx.fillStyle = colors.foodDark;
        ctx.fillRect(px + tile * 0.2, py + tile * 0.24, tile * 0.64, tile * 0.64);
        ctx.fillStyle = colors.food;
        ctx.fillRect(px + tile * 0.16, py + tile * 0.18, tile * 0.6, tile * 0.6);
        ctx.fillStyle = colors.foodLight;
        ctx.fillRect(px + tile * (0.28 + pulse * 0.04), py + tile * 0.26, tile * 0.16, tile * 0.16);
        ctx.fillStyle = colors.snakeLight;
        ctx.fillRect(px + tile * 0.54, py + tile * 0.08, tile * 0.12, tile * 0.2);
        ctx.restore();
      }

      function drawSnakePart(part, index) {
        const px = part.x * tile;
        const py = part.y * tile;
        const inset = tile * 0.08;
        const isHead = index === 0;

        ctx.save();
        ctx.shadowColor = isHead ? "#70ff6b" : "#38f58a";
        ctx.shadowBlur = isHead ? 20 : 11;
        ctx.fillStyle = colors.snake;
        ctx.fillRect(px + inset, py + inset, tile - inset * 2, tile - inset * 2);
        ctx.fillStyle = isHead ? colors.snakeLight : colors.snakeBelly;
        ctx.fillRect(px + tile * 0.22, py + tile * 0.22, tile * 0.24, tile * 0.18);
        ctx.fillStyle = "rgba(234, 255, 255, 0.22)";
        ctx.fillRect(px + tile * 0.14, py + tile * 0.12, tile * 0.58, tile * 0.1);
        ctx.restore();

        if (isHead) {
          drawEyes(px, py);
        }
      }

      function drawEyes(px, py) {
        const eyeSize = tile * 0.16;
        const pupilSize = tile * 0.08;
        let eyeA;
        let eyeB;

        if (direction.x !== 0) {
          const eyeX = direction.x > 0 ? tile * 0.68 : tile * 0.18;
          eyeA = { x: px + eyeX, y: py + tile * 0.26 };
          eyeB = { x: px + eyeX, y: py + tile * 0.58 };
        } else {
          const eyeY = direction.y > 0 ? tile * 0.68 : tile * 0.18;
          eyeA = { x: px + tile * 0.26, y: py + eyeY };
          eyeB = { x: px + tile * 0.58, y: py + eyeY };
        }

        ctx.fillStyle = colors.eye;
        ctx.fillRect(eyeA.x, eyeA.y, eyeSize, eyeSize);
        ctx.fillRect(eyeB.x, eyeB.y, eyeSize, eyeSize);
        ctx.fillStyle = colors.pupil;
        ctx.fillRect(eyeA.x + pupilSize / 2, eyeA.y + pupilSize / 2, pupilSize, pupilSize);
        ctx.fillRect(eyeB.x + pupilSize / 2, eyeB.y + pupilSize / 2, pupilSize, pupilSize);
      }

      function drawParticles() {
        ctx.save();
        particles.forEach(particle => {
          ctx.globalAlpha = Math.max(particle.life, 0);
          ctx.shadowColor = particle.color;
          ctx.shadowBlur = 18;
          ctx.fillStyle = particle.color;
          ctx.fillRect(particle.x, particle.y, particle.size, particle.size);
        });
        ctx.restore();
      }

      function drawTitlePreview(time) {
        titleTime = time;
        drawField(time);
        const ghost = [
          { x: 7 + Math.floor(Math.sin(time / 260) * 2), y: 12 },
          { x: 6 + Math.floor(Math.sin(time / 260) * 2), y: 12 },
          { x: 5 + Math.floor(Math.sin(time / 260) * 2), y: 12 },
          { x: 4 + Math.floor(Math.sin(time / 260) * 2), y: 12 }
        ];
        snake = ghost;
        direction = { x: 1, y: 0 };
        food = { x: 16, y: 12 };
        drawFood(time);
        ghost.forEach((part, index) => drawSnakePart(part, index));

        if (!running && !gameOver) {
          animationId = requestAnimationFrame(drawTitlePreview);
        }
      }

      window.addEventListener("keydown", event => {
        const directions = {
          ArrowUp: { x: 0, y: -1 },
          ArrowDown: { x: 0, y: 1 },
          ArrowLeft: { x: -1, y: 0 },
          ArrowRight: { x: 1, y: 0 }
        };

        if (directions[event.key]) {
          event.preventDefault();
          if (!running && !gameOver) {
            resetGame();
          }
          setDirection(directions[event.key]);
          return;
        }

        if (event.key === " " || event.key === "Enter") {
          event.preventDefault();
          resetGame();
        }
      });

      restartButton.addEventListener("click", resetGame);
      animationId = requestAnimationFrame(drawTitlePreview);
    })();
  </script>
</body>
</html>
